<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Palas de Pádel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid px-0">
        <!-- Banner de ofertas -->
        <div class="offers-banner">
            <div class="offer-slide">
                <i class="fas fa-credit-card fa-fade"></i>
                ACEPTAMOS TARJETA DE CRÉDITO Y DÉBITO
            </div>
            <div class="offer-slide">
                <i class="fas fa-truck fa-fade"></i>
                ENVÍOS A TODO EL PAÍS
            </div>
            <div class="offer-slide">
                <i class="fas fa-percentage fa-fade"></i>
                DESCUENTO PAGANDO CON TRANSFERENCIA
            </div>
        </div>

        <div class="filtros-container">
            <div class="filter-section">
                <label class="filter-label">MARCAS:</label>
                <div id="marcasContainer" class="checkbox-group">
                    <input type="checkbox" id="marca-adidas" class="marca-checkbox">
                    <label for="marca-adidas" class="marca-label">ADIDAS</label>
                    
                    <input type="checkbox" id="marca-bullpadel" class="marca-checkbox">
                    <label for="marca-bullpadel" class="marca-label">BULLPADEL</label>
                    
                    <input type="checkbox" id="marca-dropshot" class="marca-checkbox">
                    <label for="marca-dropshot" class="marca-label">DROPSHOT</label>
                    
                    <input type="checkbox" id="marca-kombat" class="marca-checkbox">
                    <label for="marca-kombat" class="marca-label">KOMBAT</label>
                    
                    <input type="checkbox" id="marca-nox" class="marca-checkbox">
                    <label for="marca-nox" class="marca-label">NOX</label>
                </div>
            </div>
            <div class="filter-section">
                <label class="filter-label">RANGO DE PRECIO:</label>
                <div class="range-inputs">
                    <input type="number" id="precioMin" placeholder="Mínimo">
                    <span>-</span>
                    <input type="number" id="precioMax" placeholder="Máximo">
                </div>
            </div>
        </div>

        <main class="container py-4">
            <div class="row g-4" id="productos-container">
                <!-- Los productos se cargarán dinámicamente -->
            </div>
        </main>
    </div>

    <!-- Bootstrap JS y Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
